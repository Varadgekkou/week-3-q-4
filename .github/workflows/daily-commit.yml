name: Daily Automated Commit

# Add explicit permissions
permissions:
  contents: write

on:
  schedule:
    - cron: '30 9 * * *'
  workflow_dispatch:

jobs:
  create-daily-commit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Create commit with email 24f2004422@ds.study.iitm.ac.in
      env:
        # Use the GitHub token automatically
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Create a timestamp file
        echo "Daily automated commit - $(date)" > daily-update.txt
        
        # Configure git
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "24f2004422@ds.study.iitm.ac.in"
        
        # Check if there are changes to commit
        if [ -n "$(git status --porcelain)" ]; then
          # Commit and push changes
          git add daily-update.txt
          git commit -m "Automated daily commit - $(date)"
          git push
        else
          echo "No changes to commit"
        fi
