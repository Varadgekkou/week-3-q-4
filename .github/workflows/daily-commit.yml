name: Daily Automated Commit

on:
  schedule:
    # Runs at 9:30 AM UTC every day
    # Cron syntax: minute hour day month day-of-week
    - cron: '30 9 * * *'
  workflow_dispatch:  # Allows manual triggering

jobs:
  create-daily-commit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Create commit with email 24f2004422@ds.study.iitm.ac.in
      run: |
        # Create a timestamp file
        echo "Daily automated commit - $(date)" > daily-update.txt
        
        # Configure git
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "24f2004422@ds.study.iitm.ac.in"
        
        # Commit and push changes
        git add daily-update.txt
        git commit -m "Automated daily commit - $(date)"
        git push
